<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15171a"/>
      <stop offset="100%" stop-color="#1e2126"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8def" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5b8def" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="300" height="400" rx="20" fill="url(#bgGrad)"/>

  <!-- soft ambient ring behind the scene -->
  <circle cx="150" cy="200" r="120" fill="#5b8def" opacity="0.06"/>

  <!-- desk -->
  <rect x="35" y="270" width="230" height="7" rx="3.5" fill="#33363c"/>

  <!-- laptop base / keyboard -->
  <path d="M85 256 L215 256 L230 268 L70 268 Z" fill="#1c1e22" stroke="#3a3d44" stroke-width="1.5"/>

  <!-- laptop screen -->
  <rect x="98" y="140" width="104" height="116" rx="6" fill="#0e0f11" stroke="#3a3d44" stroke-width="2"/>
  <rect x="105" y="147" width="90" height="100" rx="3" fill="#101215"/>
  <rect x="105" y="147" width="90" height="100" rx="3" fill="url(#screenGlow)"/>

  <!-- lines of "code" typing in and out -->
  <rect x="113" y="160" height="4" rx="2" fill="#5b8def">
    <animate attributeName="width" values="0;50;50;0" keyTimes="0;0.2;0.8;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="113" y="172" height="4" rx="2" fill="#7fa6f2">
    <animate attributeName="width" values="0;0;38;38;0" keyTimes="0;0.25;0.45;0.85;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="113" y="184" height="4" rx="2" fill="#a9c2f5">
    <animate attributeName="width" values="0;0;0;60;60;0" keyTimes="0;0.4;0.5;0.7;0.9;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- blinking cursor -->
  <rect x="113" y="196" width="5" height="7" fill="#5b8def">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- person: head -->
  <circle cx="150" cy="298" r="15" fill="#f5f5f3"/>

  <!-- person: shoulders / torso -->
  <path d="M121 352 Q121 314 150 314 Q179 314 179 352 Z" fill="#5b8def"/>

  <!-- typing hands -->
  <ellipse cx="136" cy="258" rx="6.5" ry="4.5" fill="#f5f5f3">
    <animate attributeName="cy" values="258;253;258" dur="0.55s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="164" cy="258" rx="6.5" ry="4.5" fill="#f5f5f3">
    <animate attributeName="cy" values="253;258;253" dur="0.55s" repeatCount="indefinite"/>
  </ellipse>

  <!-- caption -->
  <text x="150" y="384" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="1" fill="#a9adb5">WORKING REMOTELY</text>
</svg>
